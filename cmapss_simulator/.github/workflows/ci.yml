name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Go Simulator
        run: |
          cd cmapss_simulator
          go build -v ./...

      - name: Test Go Simulator
        run: |
          cd cmapss_simulator
          go test -v ./...

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Lint with ruff
        run: |
          ls -R
          # We check the streaming and dashboard directories
          python3 -m pip install ruff
          ruff check cmapss_simulator/streaming/ cmapss_simulator/dashboard/
